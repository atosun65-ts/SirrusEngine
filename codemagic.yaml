workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "SirrusEngine.xcodeproj"
        XCODE_SCHEME: "SirrusEngine"
    scripts:
      - name: Build iOS app
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Release-iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - sirrusyazilim@gmail.com
